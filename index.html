<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暉恒公司（北角紅蘋果）- 家具選購助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌟 暉恒公司（北角紅蘋果）</h1>
        <p>專業家具 • 香港製造 • 品質保證</p>
    </header>

    <nav>
        <a href="#finder" class="btn">找適合我的家具</a>
        <a href="#catalog" class="btn">產品目錄</a>
        <a href="#contact" class="btn">聯絡我們</a>
    </nav>

    <main>
        <section id="finder">
            <h2>🧠 智能家具選購助手</h2>
            <!-- These IDs match exactly what app.js expects -->
            <div id="question"></div>
            <div id="options"></div>
            <div id="results"></div>

            <!-- Optional: placeholder while loading or no results -->
            <div id="loading" style="display: none;">載入中...</div>
            <div id="no-results" style="display: none;">暫時沒有完全符合的產品，請放寬條件或聯絡我們查詢！</div>

            <button id="restart" class="btn" style="display:none;">重新開始</button>

            <div id="whatsapp-reminder" style="display:none;">
                <p>📱 <strong>請截圖以上結果並WhatsApp我們查詢報價：</strong></p>
                <a href="https://wa.me/85253908976" class="btn">立即WhatsApp ➡️</a>
            </div>
        </section>

        <section id="catalog">
            <h2>📦 完整產品目錄</h2>
            <div class="catalog-links">
                <p>查看最新產品照片、尺寸及報價：</p>
                <a href="https://linktr.ee/faihang_redapple" target="_blank" class="btn-primary">前往Linktree 產品目錄 ➡️</a>
            </div>
        </section>

        <section id="contact">
            <h2>📱 立即聯絡我們</h2>
            <div class="contact-info">
                <p><strong>WhatsApp:</strong> <a href="https://wa.me/85253908976">5390 8976</a></p>
                <p><strong>Instagram:</strong> <a href="https://www.instagram.com/faihang_redapple" target="_blank">@faihang_redapple</a></p>
                <p><strong>地址:</strong> 北角紅蘋果門市</p>
                <p>歡迎提供產品編號，我們即時報價及安排查看！</p>
            </div>
        </section>
    </main>

    <!-- IMPORTANT: Load app.js as module LAST – it imports products.js automatically -->
    <script type="module" src="app.js"></script>
</body>
</html>
