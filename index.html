<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<body>

            <h2>📦 完整產品目錄</h2>
            <div class="catalog-links">

                <a href="https://linktr.ee/faihang_redapple" target="_blank" class="btn-primary">前往Linktree ➡️</a>

        </section>
        <section id="contact">
            <h2>📱 立即聯絡</h2>
            <div class="contact-info">
                <p><strong>WhatsApp:</strong> <a href="https://wa.me/85253908976">5390 8976</a></p>
                <p><strong>Instagram:</strong> <a href="https://www.instagram.com/faihang_redapple" target="_blank">@faihang_redapple</a></p>
                <p><strong>地址:</strong> 北角紅蘋果門市</p>
                <p>發送產品編號給我們，即刻報價！</p>
            </div>
        </section>
    </main>

    <!-- Load as module - this is critical -->
    <script type="module" src="app.js"></script>
</body>
</html>
